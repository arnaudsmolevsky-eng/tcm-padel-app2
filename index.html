<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC Mâcon Padel - Gestion de Tournoi En Ligne</title>
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel pour compiler le JSX dans le navigateur -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        padel: {
                            DEFAULT: '#bef264', // lime-300
                            dark: '#84cc16', // lime-500
                            light: '#d9f99d' // lime-200
                        },
                        dark: {
                            bg: '#0f172a', // slate-900
                            card: '#1e293b', // slate-800
                            border: '#334155' // slate-700
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        // --- IMPORTS FIREBASE ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        // --- CONFIGURATION FIREBASE ---
        const myFirebaseConfig = {
            apiKey: "AIzaSyCKKmwo5RQo1xaLeR5IHq2qBTEEzlLtroo",
            authDomain: "tcm-padel.firebaseapp.com",
            projectId: "tcm-padel",
            storageBucket: "tcm-padel.firebasestorage.app",
            messagingSenderId: "1002668898979",
            appId: "1:1002668898979:web:49b0051a5f47d4d480dd16",
            measurementId: "G-00WS157FQN"
        };

        const isEnvFirebase = typeof __firebase_config !== 'undefined';
        const firebaseConfig = isEnvFirebase ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'padel-tour-pro-v1';

        let app = null, auth = null, db = null, analytics = null;
        
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            analytics = getAnalytics(app);
        } catch (error) {
            console.error("Erreur lors de l'initialisation de Firebase:", error);
        }

        // --- ICONES SVGS ---
        const IconTrophy = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconCreditCard = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>;
        const IconTimer = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 2h4"/><path d="M12 14v-4"/><path d="M4 13a8 8 0 0 1 8-8 8 8 0 0 1 8 8 8 8 0 0 1-8 8 8 8 0 0 1-8-8Z"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconTablet = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><line x1="12" x2="12.01" y1="18" y2="18"/></svg>;

        // --- COMPOSANTS SECONDAIRES & VUES ---

        const MatchTimer = ({ startTime, isFinished }) => {
            const [now, setNow] = useState(Date.now());
            useEffect(() => {
                if (isFinished || !startTime) return;
                const interval = setInterval(() => setNow(Date.now()), 1000);
                return () => clearInterval(interval);
            }, [isFinished, startTime]);

            if (!startTime) return <span>00:00</span>;
            const elapsed = Math.max(0, Math.floor((now - startTime) / 1000));
            const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const secs = (elapsed % 60).toString().padStart(2, '0');
            return <span className="font-mono ml-1">{mins}:{secs}</span>;
        };

        const NavBtn = ({ active, onClick, icon, children }) => (
            <button 
                onClick={onClick}
                className={`flex items-center space-x-2 px-4 py-2 rounded-lg font-medium transition-all ${
                    active ? 'bg-dark-border text-padel' : 'text-gray-400 hover:text-white hover:bg-dark-border/50'
                }`}
            >
                {icon}<span>{children}</span>
            </button>
        );

        const HomeView = ({ setView }) => (
            <div className="text-center py-20">
                <div className="inline-block p-4 rounded-full bg-padel/10 text-padel mb-6">
                    <IconTrophy size={48} />
                </div>
                <h1 className="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-6">
                    Tournoi Open <br/><span className="text-padel">Classement Intégral</span>
                </h1>
                <p className="text-xl text-gray-400 mb-10 max-w-2xl mx-auto">
                    Inscrivez votre paire, affrontez les meilleurs, et jouez jusqu'au bout ! Le système gère les arbres montants, descendants, et tous les matchs de classement.
                </p>
                <div className="flex flex-col sm:flex-row justify-center gap-4">
                    <button onClick={() => setView('register')} className="bg-padel hover:bg-padel-dark text-dark-bg font-bold py-4 px-8 rounded-lg text-lg uppercase tracking-wide transition-all shadow-[0_0_20px_rgba(190,242,100,0.3)] hover:shadow-[0_0_30px_rgba(190,242,100,0.5)]">
                        S'inscrire
                    </button>
                    <button onClick={() => setView('live')} className="bg-dark-card border border-dark-border hover:border-gray-500 text-white font-bold py-4 px-8 rounded-lg text-lg uppercase tracking-wide transition-all">
                        Voir les matchs en direct
                    </button>
                </div>
            </div>
        );

        const RegisterView = ({ tournaments, updateTournaments, setView }) => {
            const openTournaments = tournaments.filter(t => t.status === 'open');
            const [selectedTourneyId, setSelectedTourneyId] = useState(openTournaments[0]?.id || '');
            const [p1, setP1] = useState('');
            const [l1, setL1] = useState('');
            const [p2, setP2] = useState('');
            const [l2, setL2] = useState('');
            const [teamEmail, setTeamEmail] = useState('');
            const [success, setSuccess] = useState(false);

            const activeTourney = tournaments.find(t => t.id === Number(selectedTourneyId));
            const isFull = activeTourney ? activeTourney.teams.length >= activeTourney.maxTeams : false;
            
            const today = new Date().toISOString().split('T')[0];
            const isPastDeadline = activeTourney ? today > activeTourney.registrationDeadline : false;

            const handleSubmit = (e) => {
                e.preventDefault();
                if(!p1 || !p2 || !l1 || !l2 || !teamEmail || !activeTourney || isPastDeadline) return;
                
                const newTeam = {
                    id: Date.now(),
                    name: `${p1} / ${p2}`,
                    l1: l1,
                    l2: l2,
                    email: teamEmail,
                    paid: false
                };
                
                updateTournaments(prev => prev.map(t => 
                    t.id === activeTourney.id ? { ...t, teams: [...t.teams, newTeam] } : t
                ));

                if (activeTourney.paymentLink && activeTourney.paymentLink.trim() !== '') {
                    window.open(activeTourney.paymentLink, '_blank');
                }

                setSuccess(true);
            };

            if (openTournaments.length === 0) {
                return (
                    <div className="max-w-md mx-auto mt-12 glass-panel p-8 rounded-2xl text-center">
                        <div className="text-yellow-400 mb-4"><IconClock size={40} className="mx-auto"/></div>
                        <h2 className="text-2xl font-bold mb-2">Aucun tournoi</h2>
                        <p className="text-gray-400">Il n'y a actuellement aucun tournoi ouvert aux inscriptions.</p>
                    </div>
                );
            }

            if (success) {
                return (
                    <div className="max-w-md mx-auto mt-12 glass-panel p-8 rounded-2xl text-center border-padel">
                        <div className="w-16 h-16 bg-padel rounded-full flex items-center justify-center text-dark-bg mx-auto mb-4">
                            <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <h2 className="text-2xl font-bold mb-2 text-white">Inscription Pré-validée !</h2>
                        <p className="text-gray-400 mb-4">Votre équipe est enregistrée pour <strong>{activeTourney.name}</strong>.</p>
                        
                        <p className="text-padel text-sm font-bold mb-4">
                            Un e-mail de confirmation de pré-inscription a été envoyé à {teamEmail}.
                        </p>

                        {activeTourney.paymentLink ? (
                            <p className="bg-yellow-900/40 text-yellow-300 p-3 rounded text-sm border border-yellow-800">
                                Un nouvel onglet s'est ouvert pour le paiement. Votre inscription sera définitive une fois le paiement de <strong>{activeTourney.price}€</strong> validé par l'organisateur.
                            </p>
                        ) : (
                            <p className="bg-yellow-900/40 text-yellow-300 p-3 rounded text-sm border border-yellow-800">
                                Veuillez procéder au paiement de <strong>{activeTourney.price}€</strong> auprès de l'organisateur pour valider définitivement votre place.
                            </p>
                        )}
                        <button onClick={() => setView('live')} className="mt-6 text-padel underline text-sm">Voir les tournois</button>
                    </div>
                );
            }

            return (
                <div className="max-w-lg mx-auto mt-8">
                    <div className="glass-panel p-8 rounded-2xl">
                        <h2 className="text-3xl font-black uppercase tracking-tight mb-2">Inscription</h2>
                        <p className="text-gray-400 mb-6">Inscrivez votre paire au tournoi de votre choix.</p>

                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-gray-400 mb-1">Choix du Tournoi</label>
                                <select 
                                    value={selectedTourneyId} 
                                    onChange={e => setSelectedTourneyId(e.target.value)}
                                    className="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white focus:outline-none focus:border-padel transition-colors"
                                >
                                    {openTournaments.map(t => (
                                        <option key={t.id} value={t.id}>{t.name} ({t.teams.length}/{t.maxTeams} équipes)</option>
                                    ))}
                                </select>
                            </div>

                            {activeTourney && (
                                <div className="bg-dark-card border border-dark-border rounded-lg p-4 text-sm flex flex-col gap-2">
                                    <div className="flex justify-between items-center border-b border-dark-border pb-2">
                                        <span className="text-gray-400">Date du tournoi</span>
                                        <span className="text-white font-bold">{new Date(activeTourney.date).toLocaleDateString('fr-FR')}</span>
                                    </div>
                                    <div className="flex justify-between items-center border-b border-dark-border pb-2">
                                        <span className="text-gray-400">Limite d'inscription</span>
                                        <span className={`font-bold ${isPastDeadline ? 'text-red-400' : 'text-white'}`}>
                                            {new Date(activeTourney.registrationDeadline).toLocaleDateString('fr-FR')}
                                        </span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <span className="text-gray-400">Prix par paire</span>
                                        <span className="text-padel font-bold text-lg">{activeTourney.price} €</span>
                                    </div>
                                </div>
                            )}

                            {isFull ? (
                                <div className="bg-red-900/30 border border-red-800 text-red-300 p-4 rounded-lg text-center font-medium mt-4">
                                    Désolé, ce tournoi est déjà complet !
                                </div>
                            ) : isPastDeadline ? (
                                <div className="bg-red-900/30 border border-red-800 text-red-300 p-4 rounded-lg text-center font-medium mt-4">
                                    Les inscriptions pour ce tournoi sont clôturées depuis le {new Date(activeTourney.registrationDeadline).toLocaleDateString('fr-FR')}.
                                </div>
                            ) : (
                                <>
                                    <div className="bg-dark-card/50 p-4 rounded-xl border border-dark-border space-y-3">
                                        <label className="block text-sm font-bold text-padel uppercase tracking-wider">Joueur 1</label>
                                        <input type="text" required value={p1} onChange={e=>setP1(e.target.value)}
                                            className="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white focus:outline-none focus:border-padel transition-colors"
                                            placeholder="Nom complet" />
                                        <input type="text" required value={l1} onChange={e=>setL1(e.target.value)}
                                            className="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white focus:outline-none focus:border-padel transition-colors"
                                            placeholder="Numéro de licence" />
                                    </div>
                                    <div className="bg-dark-card/50 p-4 rounded-xl border border-dark-border space-y-3">
                                        <label className="block text-sm font-bold text-padel uppercase tracking-wider">Joueur 2</label>
                                        <input type="text" required value={p2} onChange={e=>setP2(e.target.value)}
                                            className="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white focus:outline-none focus:border-padel transition-colors"
                                            placeholder="Nom complet" />
                                        <input type="text" required value={l2} onChange={e=>setL2(e.target.value)}
                                            className="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white focus:outline-none focus:border-padel transition-colors"
                                            placeholder="Numéro de licence" />
                                    </div>

                                    <div className="bg-dark-card/50 p-4 rounded-xl border border-dark-border space-y-3">
                                        <label className="block text-sm font-bold text-padel uppercase tracking-wider">Contact de l'équipe</label>
                                        <input type="email" required value={teamEmail} onChange={e=>setTeamEmail(e.target.value)}
                                            className="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white focus:outline-none focus:border-padel transition-colors"
                                            placeholder="Adresse e-mail" />
                                    </div>
                                    
                                    <div className="pt-4">
                                        <button type="submit" disabled={!p1 || !p2 || !l1 || !l2 || !teamEmail}
                                            className="w-full bg-padel hover:bg-padel-dark text-dark-bg font-bold py-4 rounded-lg flex justify-center items-center space-x-2 transition-all disabled:opacity-50">
                                            <IconCreditCard />
                                            <span>S'inscrire {activeTourney.paymentLink ? "& Payer en ligne" : ""}</span>
                                        </button>
                                        <p className="text-xs text-center text-gray-500 mt-3">Paiement sécurisé. Non remboursable à moins de 48h du tournoi.</p>
                                    </div>
                                </>
                            )}
                        </form>
                    </div>
                </div>
            );
        };

        const BracketNode = ({ match }) => {
            const isTeam1Winner = match.winner === match.team1?.id;
            const isTeam2Winner = match.winner === match.team2?.id;

            return (
                <div className={`glass-panel w-64 rounded-xl border overflow-hidden shadow-lg flex flex-col text-sm ${match.status === 'playing' ? 'border-padel' : 'border-dark-border'}`}>
                    <div className="bg-dark-card/80 px-3 py-1.5 border-b border-dark-border flex justify-between items-center text-xs">
                        <span className={`font-bold uppercase ${match.bracket === 'main' ? 'text-white' : 'text-gray-400'}`}>{match.title}</span>
                        {match.status === 'playing' && (
                            <span className="text-padel flex items-center gap-1 font-bold bg-padel/10 px-1.5 rounded">
                                <IconTimer /> <MatchTimer startTime={match.startTime} isFinished={false} />
                            </span>
                        )}
                        {match.status === 'finished' && <span className="text-gray-500 font-bold">Terminé</span>}
                        {match.status === 'ready' && <span className="text-yellow-500 font-bold text-[10px] uppercase">En attente</span>}
                    </div>
                    
                    <div className="p-2 space-y-1 bg-dark-bg/50">
                        <div className={`flex justify-between items-center px-2 py-1.5 rounded ${isTeam1Winner ? 'bg-padel/20 text-padel font-bold' : match.team1 && !match.winner ? 'text-white' : 'text-gray-600'}`}>
                            <span className="truncate pr-2">{match.team1 ? match.team1.name : 'À déterminer...'}</span>
                            {isTeam1Winner && <IconTrophy size={14}/>}
                        </div>
                        <div className={`flex justify-between items-center px-2 py-1.5 rounded ${isTeam2Winner ? 'bg-padel/20 text-padel font-bold' : match.team2 && !match.winner ? 'text-white' : 'text-gray-600'}`}>
                            <span className="truncate pr-2">{match.team2 ? match.team2.name : 'À déterminer...'}</span>
                            {isTeam2Winner && <IconTrophy size={14}/>}
                        </div>
                    </div>
                    {match.score && match.score !== 'BYE' && (
                        <div className="text-center text-xs font-mono py-1 border-t border-dark-border bg-dark-card text-gray-300 font-bold">
                            {match.score}
                        </div>
                    )}
                    {match.status === 'playing' && match.courtId && (
                        <div className="text-center text-[10px] uppercase tracking-widest py-1 border-t border-dark-border bg-padel/10 text-padel font-bold">
                            Terrain {match.courtId}
                        </div>
                    )}
                </div>
            );
        };

        const BracketView = ({ matches, bracketType, title, icon }) => {
            const bracketMatches = matches.filter(m => m.bracket === bracketType);
            if (bracketMatches.length === 0) return null;
            
            const minRound = Math.min(...bracketMatches.map(m => m.round));
            const maxRound = Math.max(...bracketMatches.map(m => m.round));
            const rounds = [];

            for(let r = minRound; r <= maxRound; r++) {
                rounds.push(bracketMatches.filter(m => m.round === r).sort((a,b) => a.matchIdx - b.matchIdx));
            }

            return (
                <div className="mb-12 overflow-x-auto pb-6">
                    <h3 className="text-2xl font-black text-white mb-6 flex items-center gap-2">
                        {icon} <span>{title}</span>
                    </h3>
                    <div className="flex gap-12 min-w-max">
                        {rounds.map((roundMatches, rIdx) => (
                            <div key={rIdx} className="flex flex-col justify-around gap-6 relative">
                                {roundMatches.map(match => (
                                    <div key={match.id} className="relative z-10">
                                        <BracketNode match={match} />
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const UpcomingMatches = ({ activeTourney }) => {
            const readyMatches = activeTourney.matches.filter(m => m.status === 'ready');
            const playingMatches = activeTourney.matches.filter(m => m.status === 'playing');
            
            if (readyMatches.length === 0) return null;

            const now = Date.now();
            const courtFinishTimes = playingMatches
                .map(m => (m.startTime || now) + 45 * 60000)
                .sort((a, b) => a - b);
            
            while (courtFinishTimes.length < activeTourney.numCourts) {
                courtFinishTimes.unshift(now);
            }

            const estimateStart = (idx) => {
                const baseTime = courtFinishTimes[idx % activeTourney.numCourts];
                const addedRounds = Math.floor(idx / activeTourney.numCourts);
                const est = baseTime + (addedRounds * 45 * 60000);
                
                if (est <= now + 60000) return "Imminent";

                const d = new Date(est);
                return `${d.getHours().toString().padStart(2, '0')}h${d.getMinutes().toString().padStart(2, '0')}`;
            };

            return (
                <div className="mb-12">
                    <h3 className="text-2xl font-black text-white mb-6 flex items-center gap-2">
                        <IconClock /> <span>Prochains matchs en attente</span>
                    </h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {readyMatches.map((m, idx) => (
                            <div key={m.id} className="glass-panel p-4 rounded-xl border border-dark-border flex flex-col justify-between">
                                <div className="flex justify-between items-start mb-3">
                                    <span className="text-xs font-bold text-gray-400 uppercase tracking-wider">{m.bracketName} - {m.title}</span>
                                    <span className="bg-yellow-500/20 text-yellow-500 text-xs font-bold px-2 py-1 rounded-full whitespace-nowrap">
                                        Prévu ~ {estimateStart(idx)}
                                    </span>
                                </div>
                                <div className="space-y-2">
                                    <div className="font-bold text-white truncate">{m.team1?.name}</div>
                                    <div className="text-xs text-gray-500 font-black px-2">VS</div>
                                    <div className="font-bold text-white truncate">{m.team2?.name}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const LiveView = ({ tournaments, activeLiveId, setActiveLiveId }) => {
            const activeTourney = tournaments.find(t => t.id === activeLiveId) || tournaments[0];
            
            if (!activeTourney) return <div className="text-center py-20 text-gray-400">Aucun tournoi disponible.</div>;

            const bracketGroups = [];
            if (activeTourney.matches) {
                activeTourney.matches.forEach(m => {
                    if (!bracketGroups.find(g => g.id === m.bracket)) {
                        bracketGroups.push({ id: m.bracket, name: m.bracketName });
                    }
                });
            }

            return (
                <div className="space-y-4">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end border-b border-dark-border pb-4 mb-8 gap-4">
                        <div>
                            <h2 className="text-3xl font-black uppercase tracking-tight text-white">L'Arbre du Tournoi</h2>
                            <p className="text-padel font-medium">Progression en temps réel de tous les classements</p>
                        </div>
                        
                        <div className="w-full md:w-auto">
                            <label className="block text-xs uppercase text-gray-500 font-bold mb-1">Sélectionner un tournoi</label>
                            <select 
                                value={activeLiveId}
                                onChange={e => setActiveLiveId(Number(e.target.value))}
                                className="w-full md:w-64 bg-dark-card border border-dark-border rounded-lg px-3 py-2 text-white font-medium focus:border-padel focus:outline-none"
                            >
                                {tournaments.map(t => (
                                    <option key={t.id} value={t.id}>
                                        {t.name} {t.status === 'open' ? '(Inscriptions)' : '(En cours)'}
                                    </option>
                                ))}
                            </select>
                        </div>
                    </div>

                    {activeTourney.status === 'open' ? (
                        <div className="text-center py-20">
                            <div className="inline-block p-4 rounded-full bg-dark-card text-gray-500 mb-4">
                                <IconClock size={32} />
                            </div>
                            <h2 className="text-3xl font-bold mb-2">Le tournoi n'a pas encore commencé</h2>
                            <p className="text-gray-400">L'organisateur prépare les premiers matchs pour {activeTourney.name}.</p>
                        </div>
                    ) : (
                        <>
                            <UpcomingMatches activeTourney={activeTourney} />
                            <div className="h-px bg-dark-border w-full my-8"></div>
                            
                            {bracketGroups.map(group => (
                                <React.Fragment key={group.id}>
                                    <BracketView 
                                        matches={activeTourney.matches} 
                                        bracketType={group.id} 
                                        title={group.name} 
                                        icon={group.id === 'main' ? <IconTrophy/> : <IconPlay/>} 
                                    />
                                    <div className="h-px bg-dark-border w-full my-8"></div>
                                </React.Fragment>
                            ))}
                        </>
                    )}
                </div>
            );
        };

        const ScoreView = ({ tournaments, activeLiveId, setActiveLiveId, updateMatchDraft, submitMatchResult, scoreAuth, setScoreAuth }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            if (!scoreAuth) {
                const handleLogin = (e) => {
                    e.preventDefault();
                    if (password === 'AS1992') {
                        setScoreAuth(true);
                        setError('');
                    } else {
                        setError('Mot de passe incorrect.');
                        setPassword('');
                    }
                };

                return (
                    <div className="max-w-sm mx-auto mt-20 glass-panel p-8 rounded-2xl text-center">
                        <div className="w-16 h-16 bg-dark-card rounded-full flex items-center justify-center text-padel mx-auto mb-6">
                            <IconTablet size={32} />
                        </div>
                        <h2 className="text-2xl font-black mb-2 text-white uppercase tracking-tight">Espace Joueurs</h2>
                        <p className="text-gray-400 text-sm mb-6">Saisissez le mot de passe pour accéder à la saisie des scores.</p>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input 
                                type="password" 
                                placeholder="Mot de passe" 
                                value={password}
                                onChange={e => setPassword(e.target.value)}
                                className="w-full text-center text-xl tracking-widest bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white focus:outline-none focus:border-padel transition-colors"
                            />
                            {error && <p className="text-red-400 text-xs font-bold">{error}</p>}
                            <button type="submit" className="w-full bg-padel hover:bg-padel-dark text-dark-bg font-black py-3 rounded-lg uppercase tracking-wider transition-all">Déverrouiller</button>
                        </form>
                    </div>
                );
            }

            const activeTourney = tournaments.find(t => t.id === activeLiveId) || tournaments[0];
            const playingMatches = activeTourney?.matches.filter(m => m.status === 'playing') || [];

            return (
                <div className="space-y-8">
                    <div className="flex flex-col md:flex-row justify-between items-center bg-dark-card/80 p-4 rounded-xl border border-padel/30 gap-4 shadow-[0_0_20px_rgba(190,242,100,0.1)]">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-padel text-dark-bg rounded-lg"><IconTablet/></div>
                            <div>
                                <h2 className="text-xl font-black uppercase text-white">Saisie des Scores</h2>
                                <p className="text-padel text-sm font-bold">À remplir en sortant du terrain</p>
                            </div>
                        </div>
                        <select 
                            value={activeLiveId}
                            onChange={e => setActiveLiveId(Number(e.target.value))}
                            className="w-full md:w-64 bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white font-medium focus:border-padel focus:outline-none"
                        >
                            {tournaments.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                        </select>
                    </div>

                    {(!activeTourney || activeTourney.status === 'open' || playingMatches.length === 0) ? (
                        <div className="text-center py-20 glass-panel rounded-xl">
                            <p className="text-gray-400 text-xl font-medium">Aucun match en cours nécessitant un score pour le moment.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            {playingMatches.map(match => (
                                <div key={match.id} className="bg-dark-card p-6 md:p-8 rounded-3xl border-2 border-dark-border relative overflow-hidden flex flex-col justify-between">
                                    <div className="absolute top-0 right-0 bg-dark-border text-white text-sm font-black px-4 py-2 rounded-bl-xl uppercase tracking-widest">
                                        Terrain {match.courtId}
                                    </div>
                                    <div className="mb-8 mt-4">
                                        <p className="text-gray-400 font-bold uppercase tracking-wider text-sm mb-6">
                                            {match.bracketName} - {match.title}
                                        </p>
                                        <div className="space-y-4">
                                            <label className={`flex items-center p-5 rounded-2xl border-2 cursor-pointer transition-all ${match.winner === match.team1?.id ? 'bg-padel border-padel text-dark-bg shadow-[0_0_20px_rgba(190,242,100,0.4)] scale-[1.02]' : 'bg-dark-bg border-dark-border text-white hover:border-gray-500'}`}>
                                                <input type="radio" name={`tablet-winner-${match.id}`} className="hidden" 
                                                    checked={match.winner === match.team1?.id}
                                                    onChange={() => updateMatchDraft(activeTourney.id, match.id, 'winner', match.team1.id)} />
                                                <div className={`w-8 h-8 rounded-full border-4 mr-4 flex items-center justify-center ${match.winner === match.team1?.id ? 'border-dark-bg' : 'border-gray-500'}`}>
                                                    {match.winner === match.team1?.id && <div className="w-3 h-3 bg-dark-bg rounded-full"></div>}
                                                </div>
                                                <span className="font-black text-xl tracking-tight truncate">{match.team1?.name}</span>
                                            </label>

                                            <label className={`flex items-center p-5 rounded-2xl border-2 cursor-pointer transition-all ${match.winner === match.team2?.id ? 'bg-padel border-padel text-dark-bg shadow-[0_0_20px_rgba(190,242,100,0.4)] scale-[1.02]' : 'bg-dark-bg border-dark-border text-white hover:border-gray-500'}`}>
                                                <input type="radio" name={`tablet-winner-${match.id}`} className="hidden" 
                                                    checked={match.winner === match.team2?.id}
                                                    onChange={() => updateMatchDraft(activeTourney.id, match.id, 'winner', match.team2.id)} />
                                                <div className={`w-8 h-8 rounded-full border-4 mr-4 flex items-center justify-center ${match.winner === match.team2?.id ? 'border-dark-bg' : 'border-gray-500'}`}>
                                                    {match.winner === match.team2?.id && <div className="w-3 h-3 bg-dark-bg rounded-full"></div>}
                                                </div>
                                                <span className="font-black text-xl tracking-tight truncate">{match.team2?.name}</span>
                                            </label>
                                        </div>
                                    </div>
                                    <div className="mt-auto space-y-6">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-3 text-center">Score Final</label>
                                            <input type="text" placeholder="ex: 6-4 6-3" value={match.score}
                                                onChange={(e) => updateMatchDraft(activeTourney.id, match.id, 'score', e.target.value)}
                                                className="w-full bg-dark-bg border-2 border-dark-border rounded-xl px-6 py-5 text-white font-mono text-center text-3xl placeholder-gray-700 focus:border-padel focus:outline-none transition-colors" />
                                        </div>
                                        <button 
                                            onClick={() => {
                                                if (window.confirm(`Confirmez-vous que ce match est terminé avec ce score ?`)) {
                                                    submitMatchResult(activeTourney.id, match.id);
                                                    window.scrollTo(0,0);
                                                }
                                            }} 
                                            className="w-full bg-dark-bg border border-padel text-padel hover:bg-padel hover:text-dark-bg font-black py-5 rounded-xl text-xl uppercase tracking-widest transition-all"
                                        >Valider ce Match</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const AdminView = ({ tournaments, updateTournaments, activeAdminId, setActiveAdminId, startTournament, updateMatchDraft, submitMatchResult, adminAuth, setAdminAuth, updateActiveNumCourts }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [notification, setNotification] = useState('');
            
            const [newTourneyName, setNewTourneyName] = useState('');
            const [newTourneyDate, setNewTourneyDate] = useState('');
            const [newTourneyDeadline, setNewTourneyDeadline] = useState('');
            const [newTourneyPrice, setNewTourneyPrice] = useState(20);
            const [newTourneyMaxTeams, setNewTourneyMaxTeams] = useState(16);
            const [newTourneyCourts, setNewTourneyCourts] = useState(3);
            const [newTourneyPaymentLink, setNewTourneyPaymentLink] = useState('');

            if (!adminAuth) {
                const handleLogin = (e) => {
                    e.preventDefault();
                    if (password === 'AS1992') {
                        setAdminAuth(true);
                        setError('');
                    } else {
                        setError('Mot de passe incorrect.');
                        setPassword('');
                    }
                };
                return (
                    <div className="max-w-sm mx-auto mt-20 glass-panel p-8 rounded-2xl text-center">
                        <div className="w-16 h-16 bg-dark-card rounded-full flex items-center justify-center text-padel mx-auto mb-6"><IconSettings size={32} /></div>
                        <h2 className="text-2xl font-black mb-2 text-white uppercase tracking-tight">Accès Organisateur</h2>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="password" placeholder="Mot de passe" value={password} onChange={e => setPassword(e.target.value)} className="w-full text-center text-xl tracking-widest bg-dark-bg border border-dark-border rounded-lg px-4 py-3 text-white focus:outline-none focus:border-padel transition-colors" />
                            {error && <p className="text-red-400 text-xs font-bold">{error}</p>}
                            <button type="submit" className="w-full bg-padel hover:bg-padel-dark text-dark-bg font-black py-3 rounded-lg uppercase tracking-wider transition-all">Déverrouiller</button>
                        </form>
                    </div>
                );
            }

            const activeTourney = tournaments.find(t => t.id === activeAdminId) || tournaments[0];

            // Configuration et Calcul des Placements (Têtes de série)
            let p2 = 4;
            let computedSlots = [];
            if (activeTourney && activeTourney.status === 'open') {
                p2 = Math.pow(2, Math.ceil(Math.log2(Math.max(4, activeTourney.teams.length))));
                computedSlots = Array(p2).fill(null);
                let unassignedTeams = [];
                activeTourney.teams.forEach(t => {
                    if (t.slot >= 0 && t.slot < p2 && computedSlots[t.slot] === null) {
                        computedSlots[t.slot] = t;
                    } else {
                        unassignedTeams.push(t);
                    }
                });
                unassignedTeams.forEach(t => {
                    const emptyIdx = computedSlots.indexOf(null);
                    if (emptyIdx !== -1) computedSlots[emptyIdx] = t;
                });
            }

            const handleSlotChange = (slotIndex, teamIdStr) => {
                updateTournaments(prev => prev.map(t => {
                    if (t.id !== activeTourney.id) return t;
                    
                    let newTeams = [...t.teams];
                    
                    // Figer tous les slots explicitement pour autoriser l'échange fluide
                    let tempSlots = Array(p2).fill(null);
                    let tempUnassigned = [];
                    newTeams.forEach(tm => {
                        if (tm.slot >= 0 && tm.slot < p2 && tempSlots[tm.slot] === null) tempSlots[tm.slot] = tm;
                        else tempUnassigned.push(tm);
                    });
                    tempUnassigned.forEach(tm => {
                        const emptyIdx = tempSlots.indexOf(null);
                        if (emptyIdx !== -1) {
                            tempSlots[emptyIdx] = tm;
                            tm.slot = emptyIdx; 
                        }
                    });

                    if (!teamIdStr) {
                        // Libérer le slot (Le placer à BYE)
                        const currentTeamIdx = newTeams.findIndex(tm => tm.slot === slotIndex);
                        if (currentTeamIdx !== -1) newTeams[currentTeamIdx] = { ...newTeams[currentTeamIdx], slot: null };
                    } else {
                        // Échanger / Assigner la tête de série
                        const teamId = Number(teamIdStr);
                        const targetTeamIdx = newTeams.findIndex(tm => tm.id === teamId);
                        const occupyingTeamIdx = newTeams.findIndex(tm => tm.slot === slotIndex);
                        
                        if (targetTeamIdx !== -1) {
                            const oldSlot = newTeams[targetTeamIdx].slot;
                            if (occupyingTeamIdx !== -1 && occupyingTeamIdx !== targetTeamIdx) {
                                newTeams[occupyingTeamIdx] = { ...newTeams[occupyingTeamIdx], slot: oldSlot !== undefined ? oldSlot : null };
                            }
                            newTeams[targetTeamIdx] = { ...newTeams[targetTeamIdx], slot: slotIndex };
                        }
                    }
                    return { ...t, teams: newTeams };
                }));
            };

            const handleCreateTournament = (e) => {
                e.preventDefault();
                if (!newTourneyName || !newTourneyDate || !newTourneyDeadline) return;
                
                const newTourney = {
                    id: Date.now(),
                    name: newTourneyName,
                    date: newTourneyDate,
                    registrationDeadline: newTourneyDeadline,
                    price: newTourneyPrice,
                    maxTeams: newTourneyMaxTeams,
                    numCourts: newTourneyCourts,
                    paymentLink: newTourneyPaymentLink,
                    status: 'open',
                    teams: [],
                    matches: []
                };
                
                updateTournaments(prev => [...prev, newTourney]);
                setActiveAdminId(newTourney.id);
                setNewTourneyName('');
                setNewTourneyDate('');
                setNewTourneyDeadline('');
                setNewTourneyPrice(20);
                setNewTourneyPaymentLink('');
            };

            const togglePayment = (tourneyId, team) => {
                updateTournaments(prev => prev.map(t => {
                    if(t.id !== tourneyId) return t;
                    const newTeams = t.teams.map(tm => tm.id === team.id ? { ...tm, paid: true } : tm);
                    return { ...t, teams: newTeams };
                }));

                // Simulation visuelle de l'envoi de l'email
                const targetEmail = team.email ? team.email : "l'équipe";
                setNotification(`Paiement validé pour ${team.name}. Un e-mail de confirmation a été envoyé à ${targetEmail}.`);
                setTimeout(() => setNotification(''), 6000);
            };

            const activeMatches = activeTourney?.matches.filter(m => m.status === 'playing') || [];
            const readyMatches = activeTourney?.matches.filter(m => m.status === 'ready') || [];

            return (
                <div className="space-y-8 relative">
                    {/* TOAST DE NOTIFICATION EMAIL */}
                    {notification && (
                        <div className="fixed bottom-6 right-6 bg-padel text-dark-bg font-black px-6 py-4 rounded-xl shadow-[0_0_20px_rgba(190,242,100,0.4)] z-50 animate-bounce max-w-sm">
                            <div className="flex items-center gap-3">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h8"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><path d="m16 19 2 2 4-4"/></svg>
                                <span>{notification}</span>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between items-center border-b border-dark-border pb-4">
                        <h2 className="text-3xl font-black uppercase tracking-tight text-white flex items-center gap-3">
                            <IconSettings /> Espace Organisateur
                        </h2>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                        <div className="glass-panel p-5 rounded-xl border border-padel/30 lg:col-span-1">
                            <h3 className="font-bold text-padel mb-3 flex items-center gap-2"><IconPlus/> Mettre en ligne un tournoi</h3>
                            <form onSubmit={handleCreateTournament} className="space-y-3 text-sm">
                                <div><input type="text" placeholder="Nom du tournoi" required value={newTourneyName} onChange={e=>setNewTourneyName(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-white" /></div>
                                <div className="flex gap-2">
                                    <div className="flex-1">
                                        <label className="text-xs text-gray-500 mb-1 block">Date</label>
                                        <input type="date" required value={newTourneyDate} onChange={e=>setNewTourneyDate(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-white" />
                                    </div>
                                    <div className="flex-1">
                                        <label className="text-xs text-gray-500 mb-1 block">Limite Inscrip.</label>
                                        <input type="date" required value={newTourneyDeadline} onChange={e=>setNewTourneyDeadline(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-white" />
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <div className="flex-1">
                                        <label className="text-xs text-gray-500 mb-1 block">Prix / paire (€)</label>
                                        <input type="number" min="0" required value={newTourneyPrice} onChange={e=>setNewTourneyPrice(parseInt(e.target.value) || 0)} className="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-white" />
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500 mb-1 block">Lien de paiement (Stripe, Lydia, etc.) Optionnel</label>
                                    <input type="url" placeholder="https://buy.stripe.com/..." value={newTourneyPaymentLink} onChange={e=>setNewTourneyPaymentLink(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-white" />
                                </div>
                                <div className="flex gap-2">
                                    <div className="flex-1">
                                        <label className="text-xs text-gray-500 mb-1 block">Équipes max</label>
                                        <input type="number" min="4" value={newTourneyMaxTeams} onChange={e=>setNewTourneyMaxTeams(parseInt(e.target.value))} className="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-white" />
                                    </div>
                                    <div className="flex-1">
                                        <label className="text-xs text-gray-500 mb-1 block">Terrains</label>
                                        <input type="number" min="1" value={newTourneyCourts} onChange={e=>setNewTourneyCourts(parseInt(e.target.value))} className="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-white" />
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-padel/20 hover:bg-padel/40 text-padel font-bold py-2 rounded transition-colors mt-2">Créer le tournoi</button>
                            </form>
                        </div>

                        <div className="glass-panel p-5 rounded-xl lg:col-span-2 flex flex-col justify-center">
                            <h3 className="font-bold text-gray-300 mb-3">Tournoi en cours de gestion</h3>
                            <select value={activeAdminId} onChange={e => setActiveAdminId(Number(e.target.value))} className="w-full bg-dark-card border border-padel text-white text-lg font-bold rounded-lg px-4 py-3 focus:outline-none">
                                {tournaments.map(t => <option key={t.id} value={t.id}>{t.name} — {t.status === 'open' ? 'Inscriptions' : 'Lancé'}</option>)}
                            </select>
                        </div>
                    </div>

                    {!activeTourney ? null : activeTourney.status === 'open' ? (
                        <>
                            {/* NOUVEAU MODULE : PLACEMENT MANUEL & TÊTES DE SÉRIES */}
                            <div className="glass-panel p-6 rounded-xl mb-8 border-t-4 border-t-padel">
                                <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-4">
                                    <div>
                                        <h3 className="text-xl font-bold text-white flex items-center gap-2"><IconTrophy/> Placement dans l'arbre (Têtes de série)</h3>
                                        <p className="text-sm text-gray-400 mt-1">
                                            Modifiez les affrontements du premier tour. 
                                            Pour <strong>exempter une équipe</strong> (lui faire passer le premier tour), placez-la contre <strong>--- Vide (BYE) ---</strong>.
                                        </p>
                                    </div>
                                    <div className="text-padel font-bold bg-padel/10 px-4 py-2 rounded-lg text-sm whitespace-nowrap">
                                        Arbre de {p2} équipes
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {Array.from({ length: p2 / 2 }).map((_, matchIdx) => {
                                        const slot1 = matchIdx * 2;
                                        const slot2 = matchIdx * 2 + 1;
                                        const team1 = computedSlots[slot1];
                                        const team2 = computedSlots[slot2];

                                        return (
                                            <div key={matchIdx} className="bg-dark-bg border border-dark-border rounded-lg p-4 flex flex-col gap-2 shadow-lg relative">
                                                <div className="text-[10px] font-black text-gray-500 uppercase tracking-widest text-center">Match {matchIdx + 1}</div>
                                                
                                                <select 
                                                    value={team1 ? team1.id : ''} 
                                                    onChange={e => handleSlotChange(slot1, e.target.value)}
                                                    className={`w-full border rounded px-2 py-2 text-sm focus:outline-none transition-colors cursor-pointer ${team1 ? 'bg-dark-card border-padel/50 text-white font-medium' : 'bg-dark-bg border-dark-border text-gray-600 italic'}`}
                                                >
                                                    <option value="">--- Vide (BYE) ---</option>
                                                    {activeTourney.teams.map(t => (
                                                        <option key={t.id} value={t.id}>{t.name}</option>
                                                    ))}
                                                </select>
                                                
                                                <div className="text-center text-[10px] text-gray-600 font-black">VS</div>
                                                
                                                <select 
                                                    value={team2 ? team2.id : ''} 
                                                    onChange={e => handleSlotChange(slot2, e.target.value)}
                                                    className={`w-full border rounded px-2 py-2 text-sm focus:outline-none transition-colors cursor-pointer ${team2 ? 'bg-dark-card border-padel/50 text-white font-medium' : 'bg-dark-bg border-dark-border text-gray-600 italic'}`}
                                                >
                                                    <option value="">--- Vide (BYE) ---</option>
                                                    {activeTourney.teams.map(t => (
                                                        <option key={t.id} value={t.id}>{t.name}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="glass-panel p-6 rounded-xl">
                                    <h3 className="text-xl font-bold mb-4 border-b border-dark-border pb-2">Configuration de "{activeTourney.name}"</h3>
                                    <div className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="col-span-2">
                                                <label className="block text-sm text-gray-400 mb-1">Lien de paiement</label>
                                                <input type="url" value={activeTourney.paymentLink || ''} onChange={e => updateTournaments(tournaments.map(t => t.id === activeTourney.id ? {...t, paymentLink: e.target.value} : t))} className="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-white text-sm" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-gray-400 mb-1">Date</label>
                                                <input type="date" value={activeTourney.date || ''} onChange={e => updateTournaments(tournaments.map(t => t.id === activeTourney.id ? {...t, date: e.target.value} : t))} className="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-white text-sm" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-gray-400 mb-1">Limite inscrip.</label>
                                                <input type="date" value={activeTourney.registrationDeadline || ''} onChange={e => updateTournaments(tournaments.map(t => t.id === activeTourney.id ? {...t, registrationDeadline: e.target.value} : t))} className="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-white text-sm" />
                                            </div>
                                        </div>
                                        <div className="pt-4">
                                            <button onClick={() => startTournament(activeTourney.id)} className="w-full bg-padel hover:bg-padel-dark text-dark-bg font-bold py-3 rounded-lg uppercase tracking-wide shadow-[0_0_15px_rgba(190,242,100,0.2)]">
                                                Lancer l'Arbre du Tournoi
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="glass-panel p-6 rounded-xl">
                                    <h3 className="text-xl font-bold mb-4 border-b border-dark-border pb-2 flex justify-between">
                                        <span>Équipes inscrites</span>
                                        <span className={activeTourney.teams.length >= activeTourney.maxTeams ? "text-red-400" : "text-padel"}>
                                            {activeTourney.teams.length} / {activeTourney.maxTeams}
                                        </span>
                                    </h3>
                                    <ul className="space-y-2 max-h-64 overflow-y-auto pr-2">
                                        {activeTourney.teams.map((t, idx) => (
                                            <li key={t.id} className="flex justify-between items-center bg-dark-bg p-3 rounded border border-dark-border">
                                                <div>
                                                    <div className="font-medium">{t.name}</div>
                                                    {(t.l1 || t.l2) && <div className="text-[10px] text-gray-500 font-mono mt-0.5">Licences: {t.l1} / {t.l2}</div>}
                                                    {t.email && <div className="text-[10px] text-padel font-mono mt-0.5">{t.email}</div>}
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    {t.paid ? 
                                                        <span className="text-xs bg-green-900/50 text-green-400 px-2 py-1 rounded uppercase">Payé</span> : 
                                                        <button onClick={() => togglePayment(activeTourney.id, t)} className="text-xs bg-yellow-900/50 text-yellow-400 hover:bg-yellow-800/50 px-2 py-1 rounded uppercase transition-colors">Valider Paiement</button>
                                                    }
                                                </div>
                                            </li>
                                        ))}
                                        {activeTourney.teams.length === 0 && <li className="text-gray-500 italic text-center py-4">Aucune inscription</li>}
                                    </ul>
                                </div>
                            </div>
                        </>
                    ) : (
                        <div className="space-y-8">
                            <div className="bg-dark-card border border-dark-border p-5 rounded-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-lg">
                                <div>
                                    <h3 className="font-bold text-white text-lg flex items-center gap-2"><IconSettings /> Gestion des Terrains en direct</h3>
                                    <p className="text-sm text-gray-400 mt-1">Modifiez le nombre de terrains disponibles. Les matchs en cours se termineront sur leur terrain actuel.</p>
                                </div>
                                <div className="flex items-center gap-3 bg-dark-bg p-2 rounded-lg border border-dark-border">
                                    <label className="text-sm text-gray-300 font-bold px-2">Terrains actifs :</label>
                                    <input type="number" min="1" max="20" value={activeTourney.numCourts} onChange={e => updateActiveNumCourts(activeTourney.id, parseInt(e.target.value) || 1)} className="w-20 bg-dark-card border border-dark-border rounded px-3 py-2 text-padel font-black focus:border-padel focus:outline-none text-center" />
                                </div>
                            </div>

                            <div>
                                <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-padel">
                                    <span className="w-2 h-2 rounded-full bg-padel animate-pulse"></span>
                                    Matchs en cours sur les terrains ({activeMatches.length}/{activeTourney.numCourts})
                                </h3>
                                {activeMatches.length === 0 ? (
                                    <p className="text-gray-500 italic glass-panel p-6 rounded-xl text-center">Aucun match en cours. Le tournoi est peut-être terminé.</p>
                                ) : (
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        {activeMatches.map(match => (
                                            <div key={match.id} className="glass-panel p-5 rounded-xl border border-padel shadow-[0_0_15px_rgba(190,242,100,0.1)] relative overflow-hidden">
                                                <div className="absolute top-0 right-0 bg-padel text-dark-bg text-xs font-bold px-3 py-1 rounded-bl-lg">TERRAIN {match.courtId}</div>
                                                <h4 className="font-bold text-gray-300 mb-4 uppercase text-xs tracking-wider">{match.bracketName} - {match.title}</h4>
                                                
                                                <div className="space-y-4 mt-2">
                                                    <label className={`flex items-center p-3 rounded-lg border cursor-pointer transition-colors ${match.winner === match.team1?.id ? 'bg-padel/10 border-padel' : 'bg-dark-bg border-dark-border hover:border-gray-500'}`}>
                                                        <input type="radio" name={`winner-${match.id}`} className="hidden" checked={match.winner === match.team1?.id} onChange={() => updateMatchDraft(activeTourney.id, match.id, 'winner', match.team1.id)} />
                                                        <div className={`w-5 h-5 rounded-full border-2 mr-3 flex items-center justify-center ${match.winner === match.team1?.id ? 'border-padel' : 'border-gray-500'}`}>
                                                            {match.winner === match.team1?.id && <div className="w-2.5 h-2.5 bg-padel rounded-full"></div>}
                                                        </div>
                                                        <span className={`font-bold ${match.winner === match.team1?.id ? 'text-white' : 'text-gray-300'}`}>{match.team1?.name}</span>
                                                    </label>

                                                    <label className={`flex items-center p-3 rounded-lg border cursor-pointer transition-colors ${match.winner === match.team2?.id ? 'bg-padel/10 border-padel' : 'bg-dark-bg border-dark-border hover:border-gray-500'}`}>
                                                        <input type="radio" name={`winner-${match.id}`} className="hidden" checked={match.winner === match.team2?.id} onChange={() => updateMatchDraft(activeTourney.id, match.id, 'winner', match.team2.id)} />
                                                        <div className={`w-5 h-5 rounded-full border-2 mr-3 flex items-center justify-center ${match.winner === match.team2?.id ? 'border-padel' : 'border-gray-500'}`}>
                                                            {match.winner === match.team2?.id && <div className="w-2.5 h-2.5 bg-padel rounded-full"></div>}
                                                        </div>
                                                        <span className={`font-bold ${match.winner === match.team2?.id ? 'text-white' : 'text-gray-300'}`}>{match.team2?.name}</span>
                                                    </label>
                                                </div>

                                                <div className="mt-5 pt-4 border-t border-dark-border flex gap-3">
                                                    <div className="flex-1"><input type="text" placeholder="Score (ex: 6-4 6-3)" value={match.score} onChange={(e) => updateMatchDraft(activeTourney.id, match.id, 'score', e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded px-3 py-3 text-white font-mono placeholder-gray-600 focus:border-padel focus:outline-none" /></div>
                                                    <button onClick={() => submitMatchResult(activeTourney.id, match.id)} className="bg-padel hover:bg-padel-dark text-dark-bg font-bold px-4 rounded transition-colors">Valider</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- APPLICATION ROOT COMPONENT ---
        const App = () => {
            const [view, setView] = useState('home');
            const [scoreAuth, setScoreAuth] = useState(false); 
            const [adminAuth, setAdminAuth] = useState(false); 
            const [user, setUser] = useState(null);

            useEffect(() => {
                if (!auth) {
                    console.log("Mode local: Firebase n'est pas configuré. Le tournoi s'exécute en mémoire.");
                    return; 
                }
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch(e) { console.error("Erreur Auth:", e); }
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, []);
            
            const [tournaments, setTournaments] = useState([{
                id: 1, name: "Tournoi Inaugural PadelPro", date: "2026-06-15", registrationDeadline: "2026-06-10", price: 25,
                maxTeams: 8, numCourts: 3, paymentLink: "", status: 'open', 
                teams: [
                    { id: 1, name: "Dupont / Durand", l1: "111", l2: "222", email: "dupont@mail.fr", rank: 1, paid: true },
                    { id: 2, name: "Martin / Bernard", l1: "111", l2: "222", email: "martin@mail.fr", rank: 2, paid: true },
                    { id: 3, name: "Petit / Robert", l1: "111", l2: "222", email: "petit@mail.fr", rank: 3, paid: true },
                    { id: 4, name: "Richard / Garcia", l1: "111", l2: "222", email: "richard@mail.fr", rank: 4, paid: true },
                    { id: 5, name: "Moreau / Simon", l1: "111", l2: "222", email: "moreau@mail.fr", rank: 5, paid: true },
                    { id: 6, name: "Laurent / Lefebvre", l1: "111", l2: "222", email: "laurent@mail.fr", rank: 6, paid: true },
                    { id: 7, name: "Michel / Roux", l1: "111", l2: "222", email: "michel@mail.fr", rank: 7, paid: true },
                    { id: 8, name: "David / Vincent", l1: "111", l2: "222", email: "david@mail.fr", rank: 8, paid: true }
                ], matches: []
            }]);

            useEffect(() => {
                if (!user || !db) return;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', 'main');
                const unsub = onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        setTournaments(snap.data().list || []);
                    }
                }, err => console.error(err));
                return () => unsub();
            }, [user]);

            const updateTournaments = (actionOrNextState) => {
                setTournaments(prev => {
                    const next = typeof actionOrNextState === 'function' ? actionOrNextState(prev) : actionOrNextState;
                    if (auth && auth.currentUser && db) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', 'main');
                        setDoc(docRef, { list: next }).catch(console.error);
                    }
                    return next;
                });
            };
            
            const [activeLiveId, setActiveLiveId] = useState(1);
            const [activeAdminId, setActiveAdminId] = useState(1);

            const applyMatchResult = (matchesState, matchId, winnerId, score) => {
                let updated = [...matchesState];
                const matchIndex = updated.findIndex(m => m.id === matchId);
                const match = updated[matchIndex];
                
                match.winner = winnerId;
                match.score = score;
                match.status = 'finished';
                
                const winnerTeam = match.team1?.id === winnerId ? match.team1 : match.team2;
                const loserTeam = match.team1?.id === winnerId ? match.team2 : match.team1;

                if (match.nextMatchId) {
                    const nextIdx = updated.findIndex(m => m.id === match.nextMatchId);
                    if (nextIdx !== -1) {
                        if (match.blockMatchIdx % 2 === 0) updated[nextIdx].team1 = winnerTeam;
                        else updated[nextIdx].team2 = winnerTeam;
                    }
                }
                if (match.nextLoserMatchId && loserTeam) {
                    const nextLoserIdx = updated.findIndex(m => m.id === match.nextLoserMatchId);
                    if (nextLoserIdx !== -1) {
                        if (match.blockMatchIdx % 2 === 0) updated[nextLoserIdx].team1 = loserTeam;
                        else updated[nextLoserIdx].team2 = loserTeam;
                    }
                }
                return updated;
            };

            const assignCourts = (currentMatches, numCourts) => {
                let updated = [...currentMatches];
                updated.forEach(m => {
                    if (m.status === 'pending' && m.team1 && m.team2 && !m.team1.isBye && !m.team2.isBye) {
                        m.status = 'ready';
                    }
                });
                const playing = updated.filter(m => m.status === 'playing');
                const usedCourts = playing.map(m => m.courtId);
                const availableCourts = Array.from({length: numCourts}, (_, i) => i + 1).filter(id => !usedCourts.includes(id));
                const readyMatches = updated.filter(m => m.status === 'ready').sort((a,b) => (a.bracket === 'main' ? -1 : 1) || a.round - b.round);
                let courtIdx = 0;
                for (let m of readyMatches) {
                    if (courtIdx < availableCourts.length) {
                        m.status = 'playing';
                        m.courtId = availableCourts[courtIdx];
