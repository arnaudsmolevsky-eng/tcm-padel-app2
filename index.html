                        m.startTime = Date.now();
                        courtIdx++;
                    }
                }
                return updated;
            };

            const resolveByesAndAssign = (initialMatches, numCourts) => {
                let currentMatches = [...initialMatches];
                let changed = true;
                while(changed) {
                    changed = false;
                    for (let i = 0; i < currentMatches.length; i++) {
                        const m = currentMatches[i];
                        if (m.status !== 'finished' && m.team1 && m.team2 && (m.team1.isBye || m.team2.isBye)) {
                            const winner = m.team1.isBye && !m.team2.isBye ? m.team2.id : m.team1.id;
                            currentMatches = applyMatchResult(currentMatches, m.id, winner, 'BYE');
                            changed = true;
                            break;
                        }
                    }
                }
                return assignCourts(currentMatches, numCourts);
            };

            const startTournament = (tourneyId) => {
                const tourney = tournaments.find(t => t.id === tourneyId);
                if(tourney.teams.length < 3) { alert("Il faut au moins 3 équipes."); return; }
                const p2 = Math.pow(2, Math.ceil(Math.log2(Math.max(4, tourney.teams.length))));
                
                // Préparation des équipes selon les emplacements choisis
                let paddedTeams = Array(p2).fill(null);
                let unassignedTeams = [];
                
                tourney.teams.forEach(t => {
                    if (t.slot >= 0 && t.slot < p2 && paddedTeams[t.slot] === null) {
                        paddedTeams[t.slot] = t;
                    } else {
                        unassignedTeams.push(t);
                    }
                });
                
                unassignedTeams.forEach(t => {
                    const emptyIdx = paddedTeams.indexOf(null);
                    if (emptyIdx !== -1) {
                        paddedTeams[emptyIdx] = t;
                    }
                });

                // Comble les trous par des "BYE"
                for (let i = 0; i < p2; i++) {
                    if (paddedTeams[i] === null) {
                        paddedTeams[i] = { id: `bye-${i}`, name: 'Exempté (BYE)', isBye: true };
                    }
                }

                let newMatches = [];
                const R = Math.log2(p2);
                let currentBlocks = [{ id: 'main', name: 'Tableau Principal', topRank: 1, size: p2 }];

                for (let r = 0; r < R; r++) {
                    let nextBlocks = [];
                    const K = p2 / Math.pow(2, r + 1);
                    for (let b = 0; b < currentBlocks.length; b++) {
                        const block = currentBlocks[b];
                        for (let m = 0; m < K; m++) {
                            const matchIdx = b * K + m;
                            let title = `Tour ${r+1}`;
                            if (r === R - 1) {
                                if (block.topRank === 1) title = "Finale";
                                else if (block.topRank === 3) title = "Petite Finale (3e)";
                                else title = `Places ${block.topRank}-${block.topRank + 1}`;
                            } else if (r === R - 2 && block.topRank === 1) { title = "Demi-finale"; }

                            let t1 = null, t2 = null;
                            if (r === 0) { t1 = paddedTeams[matchIdx * 2]; t2 = paddedTeams[matchIdx * 2 + 1]; }

                            let nextMatchId = null; let nextLoserMatchId = null;
                            if (r < R - 1) {
                                nextMatchId = `R${r+1}-M${b * K + Math.floor(m / 2)}`;
                                nextLoserMatchId = `R${r+1}-M${b * K + (K / 2) + Math.floor(m / 2)}`;
                            }

                            newMatches.push({
                                id: `R${r}-M${matchIdx}`, bracket: block.id, bracketName: block.name, round: r,
                                matchIdx: matchIdx, blockMatchIdx: m, title: title, team1: t1, team2: t2,
                                winner: null, score: '', status: 'pending', courtId: null, startTime: null,
                                nextMatchId: nextMatchId, nextLoserMatchId: nextLoserMatchId
                            });
                        }

                        if (r < R - 1) {
                            const nextSize = block.size / 2;
                            nextBlocks.push({ id: block.id, name: block.name, topRank: block.topRank, size: nextSize });
                            const loserTopRank = block.topRank + nextSize;
                            const loserBottomRank = block.topRank + block.size - 1;
                            let loserId = `places_${loserTopRank}_${loserBottomRank}`;
                            let loserName = `Places ${loserTopRank} à ${loserBottomRank}`;
                            if (r === 0) { loserId = 'consolante'; loserName = 'Consolante (Arbre Descendant)'; } 
                            else if (loserTopRank === 3 && loserBottomRank === 4) { loserId = 'petite_finale'; loserName = 'Petite Finale (Places 3 & 4)'; }
                            nextBlocks.push({ id: loserId, name: loserName, topRank: loserTopRank, size: nextSize });
                        }
                    }
                    currentBlocks = nextBlocks;
                }

                const finalMatches = resolveByesAndAssign(newMatches, tourney.numCourts);
                updateTournaments(prev => prev.map(t => t.id === tourneyId ? { ...t, status: 'started', matches: finalMatches } : t));
            };

            const updateMatchDraft = (tourneyId, matchId, field, value) => {
                updateTournaments(prev => prev.map(t => {
                    if (t.id !== tourneyId) return t;
                    const newMatches = t.matches.map(m => m.id === matchId ? { ...m, [field]: value } : m);
                    return { ...t, matches: newMatches };
                }));
            };

            const submitMatchResult = (tourneyId, matchId) => {
                const tourney = tournaments.find(t => t.id === tourneyId);
                const match = tourney.matches.find(m => m.id === matchId);
                if (!match.winner) { alert("Veuillez sélectionner l'équipe gagnante avant de valider."); return; }
                const updatedMatches = applyMatchResult(tourney.matches, matchId, match.winner, match.score);
                const finalMatches = resolveByesAndAssign(updatedMatches, tourney.numCourts);
                
                updateTournaments(prev => prev.map(t => t.id === tourneyId ? { ...t, matches: finalMatches } : t));
            };

            const updateActiveNumCourts = (tourneyId, newNumCourts) => {
                updateTournaments(prev => prev.map(t => {
                    if (t.id !== tourneyId) return t;
                    if (t.status === 'started') {
                        const updatedMatches = assignCourts(t.matches, newNumCourts);
                        return { ...t, numCourts: newNumCourts, matches: updatedMatches };
                    }
                    return { ...t, numCourts: newNumCourts };
                }));
            };

            return (
                <div className="min-h-screen pb-20">
                    <nav className="border-b border-dark-border bg-dark-card/80 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setView('home')}>
                                    <div className="w-8 h-8 rounded-full bg-padel flex items-center justify-center text-dark-bg font-black text-xs">
                                        TCM
                                    </div>
                                    <span className="font-bold text-xl tracking-tight text-white hidden sm:inline-block">
                                        TC MÂCON <span className="text-padel">PADEL</span>
                                    </span>
                                </div>
                                <div className="hidden md:flex space-x-1">
                                    <NavBtn active={view === 'register'} onClick={() => setView('register')} icon={<IconUser/>}>Inscription</NavBtn>
                                    <NavBtn active={view === 'live'} onClick={() => setView('live')} icon={<IconPlay/>}>En Direct</NavBtn>
                                    <NavBtn active={view === 'score'} onClick={() => setView('score')} icon={<IconTablet/>}>Score</NavBtn>
                                    <NavBtn active={view === 'admin'} onClick={() => setView('admin')} icon={<IconSettings/>}>Organisateur</NavBtn>
                                </div>
                                <div className="md:hidden flex gap-2">
                                   <button onClick={() => setView('live')} className={`p-2 rounded ${view === 'live' ? 'text-padel' : 'text-gray-400'}`}><IconPlay/></button>
                                   <button onClick={() => setView('score')} className={`p-2 rounded ${view === 'score' ? 'text-padel' : 'text-gray-400'}`}><IconTablet/></button>
                                   <button onClick={() => setView('admin')} className={`p-2 rounded ${view === 'admin' ? 'text-padel' : 'text-gray-400'}`}><IconSettings/></button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto px-4 mt-8">
                        {view === 'home' && <HomeView setView={setView} />}
                        {view === 'register' && <RegisterView tournaments={tournaments} updateTournaments={updateTournaments} setView={setView} />}
                        {view === 'live' && <LiveView tournaments={tournaments} activeLiveId={activeLiveId} setActiveLiveId={setActiveLiveId} />}
                        {view === 'score' && <ScoreView 
                            tournaments={tournaments} activeLiveId={activeLiveId} setActiveLiveId={setActiveLiveId}
                            updateMatchDraft={updateMatchDraft} submitMatchResult={submitMatchResult}
                            scoreAuth={scoreAuth} setScoreAuth={setScoreAuth}
                        />}
                        {view === 'admin' && <AdminView 
                            tournaments={tournaments} updateTournaments={updateTournaments}
                            activeAdminId={activeAdminId} setActiveAdminId={setActiveAdminId}
                            startTournament={startTournament} updateMatchDraft={updateMatchDraft} submitMatchResult={submitMatchResult}
                            adminAuth={adminAuth} setAdminAuth={setAdminAuth} updateActiveNumCourts={updateActiveNumCourts}
                        />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
